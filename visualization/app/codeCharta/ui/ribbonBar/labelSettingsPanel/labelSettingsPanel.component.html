@let amountOfTopLabels = amountOfTopLabels$ | async;
@let colorLabels = colorLabels$ | async;
@let mapColors = mapColors$ | async;

<cc-slider
    [title]="'Display the labels of the ' + amountOfTopLabels + ' highest buildings'"
    label="Top Labels"
    [min]="0"
    [max]="50"
    [value]="amountOfTopLabels"
    [onChange]="applyDebouncedTopLabels"
></cc-slider>

<mat-checkbox [checked]="showMetricLabelNodeName$ | async" (change)="setShowMetricLabelNodeName($event)"
>Show node names
</mat-checkbox>

<mat-checkbox [checked]="showMetricLabelNodeValue$ | async" (change)="setShowMetricLabelNameValue($event)"
>Show metric values
</mat-checkbox>

@if (!(isDeltaState$ | async)) {
    <div class="color-labels-section">
        <span class="section-label">Color labels</span>
        <mat-checkbox
            [checked]="colorLabels.positive"
            (change)="setColorLabel($event, 'positive')"
            aria-label="positive color label"
        ><span class="color-label-swatch" [style.background-color]="mapColors.positive"></span></mat-checkbox>
        <mat-checkbox
            [checked]="colorLabels.neutral"
            (change)="setColorLabel($event, 'neutral')"
            aria-label="neutral color label"
        ><span class="color-label-swatch" [style.background-color]="mapColors.neutral"></span></mat-checkbox>
        <mat-checkbox
            [checked]="colorLabels.negative"
            (change)="setColorLabel($event, 'negative')"
            aria-label="negative color label"
        ><span class="color-label-swatch" [style.background-color]="mapColors.negative"></span></mat-checkbox>
    </div>
}

<cc-reset-settings-button
    [settingsKeys]="resetSettingsKeys"
    tooltip="Reset label settings to their defaults"
    label="Reset label settings"
></cc-reset-settings-button>
