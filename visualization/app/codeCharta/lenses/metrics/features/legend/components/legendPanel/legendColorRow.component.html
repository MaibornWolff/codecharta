@let label = mapColorFor() | mapColorLabel: colorRange() : nodeMetricRange() : colorMetric();
<div class="flex items-center gap-2">
    <svg class="h-4 w-4 shrink-0 rounded-sm border border-base-300" [attr.aria-label]="'Color for ' + label">
        <rect width="100%" height="100%" [attr.fill]="color()"></rect>
    </svg>
    <span class="min-w-0 flex-1 truncate text-sm">{{ label }}</span>
</div>
