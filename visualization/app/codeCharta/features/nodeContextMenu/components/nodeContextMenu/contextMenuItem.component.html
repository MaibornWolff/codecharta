<button
    type="button"
    class="flex w-full items-center gap-3 px-4 py-2.5 text-left text-sm font-medium hover:bg-base-200"
    [attr.id]="buttonId()"
    [title]="hoverHint()"
    (click)="itemClick.emit()"
>
    <i class="w-4 text-center {{ icon() }}"></i>
    <span class="truncate"><ng-content></ng-content></span>
</button>
