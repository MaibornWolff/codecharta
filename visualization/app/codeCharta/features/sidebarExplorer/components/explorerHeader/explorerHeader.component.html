<div class="flex items-center px-2 py-2 border-b border-base-300">
    <span class="text-xs font-semibold uppercase tracking-wide">Explorer</span>
</div>

<div class="flex items-stretch border border-base-300 mx-2 mt-2 rounded-md overflow-hidden divide-x divide-base-300">
    <cc-explorer-count-chip label="Shown" [count]="shown()" [tooltip]="shownTooltip()"></cc-explorer-count-chip>
    <cc-explorer-count-chip
        label="Flattened"
        [count]="flattened()"
        popoverId="explorer-flatten-rules"
        anchorName="explorer-flat-chip"
    ></cc-explorer-count-chip>
    <cc-explorer-count-chip
        label="Hidden"
        [count]="hidden()"
        popoverId="explorer-hidden-rules"
        anchorName="explorer-hidden-chip"
    ></cc-explorer-count-chip>
</div>
