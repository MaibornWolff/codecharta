<span
    class="node-name"
    [class.line-through]="isFlattenedFile()"
    [class.italic]="isUnclickable() || !isAreaMetricValid()"
    [class.opacity-50]="!isAreaMetricValid()"
    [class.text-primary]="isSearchResult()"
    [class.font-semibold]="isSearchResult()"
>
    {{ node().name }}
</span>
