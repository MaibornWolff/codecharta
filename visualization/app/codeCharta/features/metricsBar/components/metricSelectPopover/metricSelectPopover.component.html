<cc-settings-popover-shell
    [popoverId]="popoverId()"
    [anchorName]="anchorName()"
    widthClass="w-80"
    contentClass="gap-2 p-2"
    [testId]="'metric-select-popover-' + anchorName()"
>
    <label class="input input-sm input-bordered flex items-center gap-2">
        <i class="fa fa-search opacity-60"></i>
        <input
            #searchInput
            type="text"
            class="grow"
            autofocus
            [placeholder]="placeholder()"
            [value]="searchTerm()"
            (input)="handleSearchTermChange($any($event.target).value)"
            (keydown)="handleKeyDown($event)"
        />
    </label>

    <ul class="flex flex-col max-h-[440px] overflow-y-auto m-0 p-0 list-none">
        @if (isOpen()) {
            @for (option of metricData() | filterMetricDataBySearchTerm: searchTerm(); track option.name; let i = $index) {
                <li class="flex">
                    <button
                        type="button"
                        class="flex items-center justify-between gap-2 w-full px-2 py-1 rounded border-0 text-left cursor-pointer"
                        [class]="i === activeIndex() ? 'bg-base-200' : 'bg-transparent hover:bg-base-200'"
                        [class.font-semibold]="option.name === selected()"
                        [attr.data-metric-name]="option.name"
                        [attr.data-active]="i === activeIndex() ? 'true' : null"
                        [title]="attributeDescriptors()[option.name] | attributeDescriptorTooltip: option.name"
                        (click)="handleSelect(option.name)"
                        (mouseenter)="activeIndex.set(i)"
                    >
                        <span class="flex flex-col items-start gap-0.5 min-w-0 flex-1">
                            <span class="truncate w-full">
                                {{ option.name }}
                                @if (option.name === "complexity" || option.name === "sonar_complexity") {
                                    <span class="text-xs opacity-50">(formerly mcc)</span>
                                }
                            </span>
                            @if (attributeDescriptors()[option.name]?.description; as descriptorSubtitle) {
                                <span class="text-xs opacity-60 truncate w-full">{{ descriptorSubtitle }}</span>
                            }
                        </span>
                        <span class="text-xs opacity-60 shrink-0">({{ option.maxValue }})</span>
                    </button>
                </li>
            } @empty {
                <li class="px-2 py-3 text-xs opacity-60">No metrics found</li>
            }
        }
    </ul>
</cc-settings-popover-shell>
