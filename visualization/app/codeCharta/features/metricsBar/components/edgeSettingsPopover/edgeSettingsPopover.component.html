<cc-settings-popover-shell [popoverId]="popoverId()" [anchorName]="anchorName()" widthClass="w-80">
    <div [title]="edgePreviewLabel()">
        <span class="text-sm">Preview</span>
        <cc-slider-number-input
            [min]="0"
            [max]="amountOfBuildingsWithSelectedEdgeMetric()"
            [value]="amountOfEdgePreviews()"
            [disabled]="amountOfBuildingsWithSelectedEdgeMetric() === 0"
            (valueChange)="setAmountOfEdgePreviews($event)"
        ></cc-slider-number-input>
    </div>

    <div title="Adjust the curve height">
        <span class="text-sm">Height</span>
        <cc-slider-number-input
            [min]="1"
            [max]="9"
            [value]="edgeHeight()"
            [disabled]="amountOfBuildingsWithSelectedEdgeMetric() === 0"
            (valueChange)="setEdgeHeight($event)"
        ></cc-slider-number-input>
    </div>

    <div class="flex flex-col gap-2">
        <div class="flex items-center gap-2">
            <cc-color-picker-for-map-color [mapColorFor]="'outgoingEdge'" class="flex-1"></cc-color-picker-for-map-color>
            <label class="flex items-center gap-2 cursor-pointer">
                <input
                    type="checkbox"
                    class="checkbox checkbox-sm checkbox-primary"
                    [checked]="showOutgoingEdges()"
                    (change)="setShowOutgoingEdges($event)"
                />
                <span>Show</span>
            </label>
        </div>
        <div class="flex items-center gap-2">
            <cc-color-picker-for-map-color [mapColorFor]="'incomingEdge'" class="flex-1"></cc-color-picker-for-map-color>
            <label class="flex items-center gap-2 cursor-pointer">
                <input
                    type="checkbox"
                    class="checkbox checkbox-sm checkbox-primary"
                    [checked]="showIncomingEdges()"
                    (change)="setShowIncomingEdges($event)"
                />
                <span>Show</span>
            </label>
        </div>
    </div>

    <label class="flex items-center gap-2 cursor-pointer">
        <input
            type="checkbox"
            class="checkbox checkbox-sm checkbox-primary"
            [checked]="showOnlyBuildingsWithEdges()"
            [disabled]="amountOfBuildingsWithSelectedEdgeMetric() === 0"
            (change)="setShowOnlyBuildingsWithEdges($event)"
        />
        <span>Only show nodes with edges</span>
    </label>

    <cc-edge-metric-toggle></cc-edge-metric-toggle>

    <cc-reset-settings-button
        [settingsKeys]="resetKeys"
        tooltip="Reset edge metric settings to their defaults"
        label="Reset edge metric settings"
    ></cc-reset-settings-button>
</cc-settings-popover-shell>
