<div class="flex items-center gap-2">
    <input
        type="number"
        class="input input-sm input-bordered w-16 text-center"
        [value]="currentLeftValue"
        (input)="handleCurrentLeftInputChanged($event)"
        [min]="minValue"
        [max]="upcomingRightValue"
    />

    <div #rangeSliderContainer class="flex flex-1 mx-2 relative leading-[48px]">
        <span
            class="inline-block border-b-4 border-solid"
            [style.width.px]="sliderRangePosition.leftEnd"
            [style.border-bottom-color]="leftColor"
        ></span>
        <span
            class="inline-block border-b-4 border-solid"
            [style.width.px]="sliderRangePosition.rightStart - sliderRangePosition.leftEnd"
            [style.border-bottom-color]="middleColor"
        ></span>
        <span
            class="inline-block border-b-4 border-solid"
            [style.width.px]="sliderWidth - sliderRangePosition.rightStart"
            [style.border-bottom-color]="rightColor"
        ></span>

        <div
            #leftThumb
            class="cursor-pointer absolute -top-1 rounded-full border-[7px] border-primary"
            [style.left.px]="sliderRangePosition.leftEnd - thumbRadius"
            (mousedown)="setCurrentlySliding('leftThumb')"
            (keydown)="handleLeftThumbKeydown($event)"
            role="slider"
            aria-label="Lower color range value"
            [attr.aria-valuemin]="minValue"
            [attr.aria-valuemax]="currentRightValue"
            [attr.aria-valuenow]="currentLeftValue"
            tabindex="0"
        ></div>
        <div
            #rightThumb
            class="cursor-pointer absolute -top-1 rounded-full border-[7px] border-primary"
            [style.left.px]="sliderRangePosition.rightStart - thumbRadius"
            (mousedown)="setCurrentlySliding('rightThumb')"
            (keydown)="handleRightThumbKeydown($event)"
            role="slider"
            aria-label="Upper color range value"
            [attr.aria-valuemin]="currentLeftValue"
            [attr.aria-valuemax]="maxValue"
            [attr.aria-valuenow]="currentRightValue"
            tabindex="0"
        ></div>
        <cc-range-slider-labels
            [minValue]="minValue"
            [maxValue]="maxValue"
            [leftValueLabel]="upcomingLeftValue"
            [rightValueLabel]="upcomingRightValue"
            [sliderRangePosition]="sliderRangePosition"
            [sliderWidth]="sliderWidth"
        ></cc-range-slider-labels>
    </div>

    <input
        type="number"
        class="input input-sm input-bordered w-16 text-center"
        [value]="currentRightValue"
        (input)="handleCurrentRightInputChanged($event)"
        [min]="upcomingLeftValue"
        [max]="maxValue"
    />
</div>
