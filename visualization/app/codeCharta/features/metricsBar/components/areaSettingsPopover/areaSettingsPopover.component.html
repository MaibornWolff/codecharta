<cc-settings-popover-shell [popoverId]="popoverId()" [anchorName]="anchorName()">
    <div title="Amount of space between buildings in percent">
        <span class="text-sm">Margin</span>
        <cc-slider-number-input [min]="1" [max]="100" [value]="margin()" (valueChange)="setMargin($event)"></cc-slider-number-input>
    </div>

    <label class="flex items-center gap-2 cursor-pointer">
        <input
            type="checkbox"
            class="checkbox checkbox-sm checkbox-primary"
            [checked]="enableFloorLabels()"
            (change)="setEnableFloorLabel($event)"
        />
        <span>Enable Floor Labels</span>
    </label>

    <label class="flex items-center gap-2 cursor-pointer">
        <input
            type="checkbox"
            class="checkbox checkbox-sm checkbox-primary"
            [checked]="isInvertedArea()"
            (change)="toggleInvertingArea($event)"
        />
        <span>Invert Area</span>
    </label>

    <cc-reset-settings-button
        [settingsKeys]="resetKeys"
        tooltip="Reset area metric settings to their defaults"
        label="Reset area metric settings"
    ></cc-reset-settings-button>
</cc-settings-popover-shell>
